# CI-пайплайн (Task 0002, R-9: Definition of Done = зелёный CI).
# Шаги идентичны `make check` — локально и в CI один и тот же канон (P-12).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check (ruff format)
        run: ruff format --check src tests

      - name: Lint (ruff check)
        run: ruff check src tests

      - name: Import boundaries (import-linter, R-5)
        run: lint-imports

      - name: Type check (mypy strict)
        run: mypy

      - name: Tests + coverage threshold (pytest)
        run: pytest
