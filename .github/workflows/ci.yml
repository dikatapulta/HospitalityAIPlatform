# CI/CD-пайплайн.
#   check + dev-environment — Task 0002/0004: проверки идентичны `make check` (P-12).
#   deploy-staging          — Task 0006: катит main на staging после зелёного CI.
# R-9: Definition of Done = зелёный CI.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:  # ручной триггер деплоя (кнопка в Actions / `make deploy-staging`)

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    # Тесты слоя БД (Task 0008) гоняются на настоящем Postgres — том же образе,
    # что и локальный `make dev`. Параметры совпадают с дефолтами Settings.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hospitality
          POSTGRES_PASSWORD: hospitality
          POSTGRES_DB: hospitality
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hospitality -d hospitality"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check (ruff format)
        run: ruff format --check src tests alembic

      - name: Lint (ruff check)
        run: ruff check src tests alembic

      - name: Import boundaries (import-linter, R-5)
        run: lint-imports

      - name: Type check (mypy strict)
        run: mypy

      - name: Tests + coverage threshold (pytest)
        run: pytest

      # Task 0009, P-4: отдельный шаг, чтобы тест изоляции был виден как
      # самостоятельный блокер и не мог исчезнуть незаметно — pytest падает
      # (exit code 5), если файл переименован/пуст и тесты не собрались.
      # --no-cov: порог покрытия уже проверен полным прогоном выше.
      - name: "Изоляция тенантов — обязательный тест (падение = блокер, навсегда)"
        run: pytest tests/test_tenant_isolation.py --no-cov

  # Task 0008: миграции применяются на чистый Postgres, и модели не разошлись
  # с историей миграций (`alembic check` падает, если autogenerate нашёл diff).
  migrations:
    name: migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hospitality
          POSTGRES_PASSWORD: hospitality
          POSTGRES_DB: hospitality
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hospitality -d hospitality"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e "."

      - name: alembic upgrade head (чистая БД)
        run: alembic upgrade head

      - name: alembic check (модели == миграции)
        run: alembic check

      - name: alembic downgrade base && upgrade head (миграции обратимы)
        run: |
          alembic downgrade base
          alembic upgrade head

  dev-environment:
    name: dev-environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image (ops/Dockerfile)
        run: docker compose -f ops/docker-compose.yml --env-file .env.example build app

      - name: "Smoke test (Task 0004): compose поднимается, Postgres и Redis отвечают"
        run: ./ops/smoke.sh

  # Деплой на staging (Task 0006). Идёт только после зелёных check + dev-environment,
  # только на push в main или ручной запуск. Пока секреты VPS не заданы — job
  # грациозно пропускается (main не краснеет до провижининга сервера).
  deploy-staging:
    name: deploy-staging
    needs: [check, migrations, dev-environment]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # push образа в GitHub Container Registry (GHCR)
    steps:
      - uses: actions/checkout@v4

      # Если STAGING_SSH_HOST не задан — сервера ещё нет, деплой пропускаем.
      - name: Проверить, настроен ли staging
        id: guard
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          if [ -z "$STAGING_SSH_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Секрет STAGING_SSH_HOST не задан — деплой пропущен. Настройте VPS по docs/runbooks/deploy.md."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # Имя образа GHCR обязано быть в нижнем регистре. Имя пакета фиксировано —
      # `hospitality-app`; из репозитория берём только владельца. Так имя не зависит
      # от имени репозитория и совпадает с runbook (P-12: одно каноническое имя).
      - name: Вычислить тег образа
        if: steps.guard.outputs.configured == 'true'
        id: image
        run: |
          owner_lower="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner_lower}/hospitality-app:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "staging=ghcr.io/${owner_lower}/hospitality-app:staging" >> "$GITHUB_OUTPUT"

      - name: Login в GHCR
        if: steps.guard.outputs.configured == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Собрать и запушить production-образ
        if: steps.guard.outputs.configured == 'true'
        run: |
          docker build -f ops/Dockerfile --target production \
            -t "${{ steps.image.outputs.ref }}" \
            -t "${{ steps.image.outputs.staging }}" .
          docker push "${{ steps.image.outputs.ref }}"
          docker push "${{ steps.image.outputs.staging }}"

      - name: Настроить SSH
        if: steps.guard.outputs.configured == 'true'
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Скопировать конфиг деплоя на сервер
        if: steps.guard.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
            "mkdir -p /opt/hospitality/cloudflared"
          scp -i ~/.ssh/id_deploy -P "${SSH_PORT:-22}" \
            ops/deploy/docker-compose.staging.yml ops/deploy/deploy.sh \
            "$SSH_USER@$SSH_HOST:/opt/hospitality/"
          scp -i ~/.ssh/id_deploy -P "${SSH_PORT:-22}" \
            ops/deploy/cloudflared/config.yml \
            "$SSH_USER@$SSH_HOST:/opt/hospitality/cloudflared/"

      - name: Выкатить и прогнать post-deploy smoke
        if: steps.guard.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
            "chmod +x /opt/hospitality/deploy.sh && /opt/hospitality/deploy.sh '${{ steps.image.outputs.ref }}'"
