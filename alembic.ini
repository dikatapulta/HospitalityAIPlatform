# Конфигурация Alembic (Task 0008, FOUNDATION §9: схема БД меняется только миграциями).
#
# Канон новой миграции (P-12):
#   .venv/bin/alembic revision --rev-id NNNN -m "short_english_slug" --autogenerate
# --rev-id — следующий порядковый номер (0002, 0003, ...): последовательные,
# читаемые номера вместо случайных хэшей. DSN берётся из настроек окружения
# (env.py → get_settings), поэтому url здесь не задан.

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
