# Staging-стек (Task 0006). Живёт НА сервере в $DEPLOY_DIR, запускается
# скриптом ops/deploy/deploy.sh — вручную или из CI по SSH.
#
# Отличия от локального ops/docker-compose.yml:
#   - app берётся готовым образом из GHCR (${APP_IMAGE}), а НЕ собирается здесь —
#     на сервере крутится ровно тот артефакт, что прошёл CI.
#   - restart: unless-stopped — стек переживает перезагрузку VPS.
#   - наружу НЕ открыт ни один порт: вход идёт через именованный Cloudflare-туннель
#     (сервис cloudflared), держащий исходящее соединение. app/db/redis доступны
#     лишь внутри compose-сети — минимальная поверхность атаки, TLS у Cloudflare.
#
# Секреты (POSTGRES_*, CLOUDFLARED_CREDS_FILE) читаются из .env рядом с этим
# файлом (см. .env.staging.example). APP_IMAGE при деплое подставляет deploy.sh и
# после успеха записывает его строкой в .env — поэтому ручные
# `docker compose ...`-команды из runbook'ов работают без подготовки.
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    # APP_IMAGE обязателен: без него deploy не знает, какую версию катить.
    image: ${APP_IMAGE:?APP_IMAGE не задан (ghcr.io/<owner>/hospitality-app:<sha>)}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Без default'а намеренно (:?): staging без заданного токена обязан упасть
      # на деплое, а не подняться с общеизвестным dev-значением из кода (§11).
      SERVICE_TOKEN: ${SERVICE_TOKEN:?SERVICE_TOKEN не задан — добавьте в .env (см. .env.staging.example)}
      SERVICE_TOKEN_TENANT_SLUG: ${SERVICE_TOKEN_TENANT_SLUG:-demo-hotel}
      # AI Gateway (Task 0014, §7.2): пустой ключ валиден (боевой провайдер просто
      # не соберётся) — без default'а :? здесь не нужен, в отличие от SERVICE_TOKEN.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5}
      # Канал Telegram (Task 0016, §8.4): пустой TELEGRAM_WEBHOOK_SECRET закрывает
      # вебхук (fail-closed) — тоже без :?, staging без Telegram остаётся рабочим.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_TENANT_SLUG: ${TELEGRAM_TENANT_SLUG:-demo-hotel}
      # Staff-чат (Task 0017): app распознаёт по нему команды персонала во входящем
      # вебхуке; пустой = уведомления/команды службы выключены.
      TELEGRAM_STAFF_CHAT_ID: ${TELEGRAM_STAFF_CHAT_ID:-}
    # Портов наружу нет намеренно: единственный вход — cloudflared (ниже),
    # который достаёт app по имени сервиса внутри compose-сети (http://app:8000).
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # /health/live не ходит в зависимости → показывает «процесс жив».
    # `docker compose up --wait` ждёт этот healthcheck; более глубокий
    # /health/ready проверяет deploy.sh после старта.
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys,urllib.request; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health/live\").status==200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Постоянный HTTPS-вход (issue #65): именованный Cloudflare-туннель как сервис.
  # Держит исходящее соединение к Cloudflare — порт наружу не нужен. Конфиг
  # ingress и id туннеля — в ./cloudflared/config.yml (в репо); секретный JSON
  # туннеля монтируется с хоста по CLOUDFLARED_CREDS_FILE (не в репо). Версия
  # образа запинена (P-1: предсказуемость, не :latest).
  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/config.yml", "run"]
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDS_FILE:?CLOUDFLARED_CREDS_FILE не задан — путь к JSON туннеля на хосте (см. .env.staging.example)}:/etc/cloudflared/creds.json:ro
    depends_on:
      app:
        condition: service_healthy

  # Воркер доменных событий (Task 0010, ADR-005): тот же образ, другая команда
  # (§5.3). Без healthcheck: `up --wait` считает его готовым по факту запуска;
  # мгновенное падение процесса деплой всё равно увидит (контейнер не running).
  worker:
    image: ${APP_IMAGE:?APP_IMAGE не задан (ghcr.io/<owner>/hospitality-app:<sha>)}
    restart: unless-stopped
    command: ["python", "-m", "hospitality.worker"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Уведомления Telegram (Task 0017) шлёт ВОРКЕР (подписчики событий), поэтому
      # ему нужны токен бота и id staff-чата; секрет вебхука — нет (вебхуки у app).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_STAFF_CHAT_ID: ${TELEGRAM_STAFF_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
