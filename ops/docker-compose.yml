# Локальная среда одной командой (Task 0004, FOUNDATION §16 Фаза 0).
# Запуск — через `make dev` из корня репозитория (см. Makefile).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  app:
    build:
      context: ..
      dockerfile: ops/Dockerfile
      target: dev  # hot-reload образ; production-цель катится на staging (Task 0006)
    working_dir: /app
    volumes:
      - ../src:/app/src
    ports:
      - "${APP_PORT}:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-dev-service-token}
      SERVICE_TOKEN_TENANT_SLUG: ${SERVICE_TOKEN_TENANT_SLUG:-demo-hotel}
      # AI и канал Telegram (Task 0019): зеркало docker-compose.staging.yml —
      # без проброса локальный app не видел ключа модели и секрета вебхука,
      # и smoke-сценарии гостя (make smoke) было не прогнать локально.
      # LLM_MODEL по умолчанию — claude-sonnet-5 (ADR-012, docs-drift H-3): то же
      # значение, что в config.py, .env.example и docker-compose.staging.yml.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-5}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_TENANT_SLUG: ${TELEGRAM_TENANT_SLUG:-demo-hotel}
      TELEGRAM_STAFF_CHAT_ID: ${TELEGRAM_STAFF_CHAT_ID:-}
      # Тюнинг AI Gateway (runbook errors.md, ERR-AI-001/002): без проброса
      # значения из .env не доходят до контейнера (docs-drift H-2). Дефолты — те
      # же, что в config.py и в ops/deploy/docker-compose.staging.yml.
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30.0}
      LLM_MAX_ATTEMPTS: ${LLM_MAX_ATTEMPTS:-3}
      LLM_TENANT_DAILY_BUDGET_USD: ${LLM_TENANT_DAILY_BUDGET_USD:-5.0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Воркер доменных событий (Task 0010, ADR-005): тот же образ, другая команда.
  # Авто-reload у процесса нет — после правок кода: docker compose restart worker.
  # До `make migrate` воркер пишет worker_iteration_failed (нет таблицы outbox) —
  # это ожидаемо: он повторяет попытки и оживает сам после миграций.
  worker:
    build:
      context: ..
      dockerfile: ops/Dockerfile
      target: dev
    working_dir: /app
    command: ["python", "-m", "hospitality.worker"]
    volumes:
      - ../src:/app/src
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Воркер тоже зовёт gateway (перевод сути заявки для staff-чата, баг #71),
      # поэтому тюнинг AI Gateway нужен и ему (runbook errors.md, ERR-AI-001/002;
      # без проброса значения из .env не доходят до контейнера — docs-drift H-2).
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30.0}
      LLM_MAX_ATTEMPTS: ${LLM_MAX_ATTEMPTS:-3}
      LLM_TENANT_DAILY_BUDGET_USD: ${LLM_TENANT_DAILY_BUDGET_USD:-5.0}
      # Тюнинг доставки outbox (docs-drift H-2): дефолты — те же, что в config.py
      # и в ops/deploy/docker-compose.staging.yml.
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-1.0}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-50}
      WORKER_MAX_DELIVERY_ATTEMPTS: ${WORKER_MAX_DELIVERY_ATTEMPTS:-10}
      WORKER_RETRY_BACKOFF_BASE_SECONDS: ${WORKER_RETRY_BACKOFF_BASE_SECONDS:-2.0}
      WORKER_RETRY_BACKOFF_MAX_SECONDS: ${WORKER_RETRY_BACKOFF_MAX_SECONDS:-300.0}
      WORKER_CLEANUP_INTERVAL_SECONDS: ${WORKER_CLEANUP_INTERVAL_SECONDS:-3600.0}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
